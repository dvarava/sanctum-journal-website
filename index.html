<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sanctum Journal</title>
    <meta
        name="description"
        content="Sanctum Journal is a private desktop journal with encrypted local storage and on-device reflection."
    />
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <header class="site-header">
        <a class="brand" href="#top" aria-label="Sanctum Journal">
            <img src="./assets/appicon.png" alt="Sanctum Journal icon" />
            <span>Sanctum Journal</span>
        </a>
    </header>

    <main id="top">
        <section class="hero">
            <div class="section-inner hero-layout">
                <div class="hero-copy">
                    <p class="eyebrow">Private desktop journal</p>
                    <h1>Write privately. Reflect locally.</h1>
                    <p class="hero-text">
                        Encrypted notes, calm history, and AI reflection that can stay on your device.
                    </p>
                    <a class="button button-primary" href="./downloads/Sanctum-Journal-macOS.zip" download="Sanctum-Journal-macOS.zip">
                        Download for macOS
                    </a>
                </div>

                <div class="hero-visual" aria-hidden="true">
                    <div class="hero-glow"></div>
                    <img src="./assets/home-screen.png" alt="" />
                </div>
            </div>
        </section>

        <section class="feature-band" id="features">
            <div class="section-inner feature-grid">
                <article class="feature-item">
                    <span class="feature-kicker">Vault</span>
                    <strong>Password-protected journal</strong>
                </article>
                <article class="feature-item">
                    <span class="feature-kicker">History</span>
                    <strong>Clean archive of past entries</strong>
                </article>
                <article class="feature-item">
                    <span class="feature-kicker">Reflection</span>
                    <strong>On-device AI support</strong>
                </article>
            </div>
        </section>
    </main>
</body>
</html>
